format: atomyx/v1
appId: dev.atomyx.demo
name: Composed flow — requires + runFlow
description: |
  Demonstrates flow composition. `requires` runs setup-fresh-user
  before the script's own steps so the test starts on a known
  account. `runFlow` invokes a teardown sub-flow inline at the end
  so cleanup happens regardless of which UI path the test took.
  Both sub-flows share this script's variables and captures.
tags:
  - composition
  - sub-flow
  - api
proxy: required
requires:
  - flows/setup-fresh-user.yml
env:
  email: qa+composed@atomyx.test
  password: super-secret
---
# At this point setup-fresh-user has already run: a fresh account
# exists, ${newUserId} is populated, and the app is sitting on the
# Welcome screen.

- waitFor: "Welcome"
- tap: "Continue"
- waitFor: "Dashboard"

# Drive a quick edit while the proxy captures the save call.
- tap: "Edit profile"
- waitFor:
    text: "Display name"
    timeout: 5000
- type:
    into:
      id: display_name
    text: "QA Bot ${newUserId}"

- capture: "PUT /api/v1/me as: updateRsp"
- tap: "Save"

- assertApi:
    from: updateRsp
    status: 200
    body:
      "$.user.id": ${newUserId}
      "$.user.display_name": "QA Bot ${newUserId}"

- waitFor: "Profile updated"
- screenshot: profile-updated

# Inline composition. The cleanup file's steps execute as if they
# were inlined here — including any nested handle / branch /
# capture they declare.
- runFlow:
    file: flows/cleanup-account.yml
