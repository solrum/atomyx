name: ts

# TypeScript monorepo CI.
#
# What this verifies:
#   1. Root legacy `src/` still typechecks + tests pass (will be
#      deleted after strangler-fig flip, but until then it ships
#      the production MCP server and must stay green).
#   2. Each `packages/core-driver-*` package typechecks.
#   3. Each package's unit tests pass (node --test).
#   4. Dependency build order resolves — core-driver must build
#      before its consumers (drivers, mcp, cli).
#
# What this does NOT verify:
#   - Real-device smoke (needs hardware, scripts/ios-*.mjs / Android
#     APK — run locally or in a separate workflow with runners)
#   - End-to-end MCP stack against a live driver
#   - dependency-cruiser boundary enforcement (planned, gated on
#     baseline scan completion — currently warn-only)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  legacy-src:
    name: legacy src/ (root tsc + npm test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: install (root workspace)
        run: npm ci

      - name: typecheck legacy src
        run: npx tsc --noEmit

      - name: test legacy src
        run: npm test
        env:
          ATOMYX_TOOL_TIMING: '0'

  packages:
    name: packages/${{ matrix.pkg }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: legacy-src
    strategy:
      fail-fast: false
      matrix:
        pkg:
          - core-driver
          - core-driver-wire
          - core-driver-android
          - core-driver-ios
          - core-driver-mcp
          - core-driver-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # npm install at the repo root hoists workspace deps and
      # symlinks @atomyx/* packages into root node_modules. Each
      # matrix job rebuilds from scratch (no inter-job cache
      # beyond npm's module cache) so builds are isolated.
      - name: install (root workspace)
        run: npm ci

      # Build the upstream deps in topological order. core-driver
      # and core-driver-wire are leaves; drivers depend on both;
      # mcp depends on core-driver; cli depends on all four
      # driver/mcp packages. A single TSC pass per dep is cheap.
      - name: build upstream packages
        run: |
          for d in core-driver core-driver-wire core-driver-android \
                   core-driver-ios core-driver-mcp core-driver-cli; do
            echo "::group::build $d"
            (cd packages/$d && npx tsc)
            echo "::endgroup::"
          done

      - name: test ${{ matrix.pkg }}
        working-directory: packages/${{ matrix.pkg }}
        run: node --import tsx --test $(find src -name '*.test.ts')
