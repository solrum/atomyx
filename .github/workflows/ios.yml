name: ios

# Xcode / iOS matrix for the Swift driver.
#
# What this verifies:
#   1. XcodeGen config still generates a valid .xcodeproj on each
#      supported Xcode version
#   2. Swift compiles with no warnings/errors across the target matrix
#   3. Unit tests (CommandHandlerUnitTests) pass — exercises command
#      handlers + MockXCUIBridge + wire protocol encode/decode
#
# What this does NOT verify:
#   - The serving driver (testServeCommands) — blocks forever, can't
#     run in CI without a host-side orchestrator
#   - End-to-end MCP stack (scripts/ios-mcp-smoke.mjs) — requires a
#     real simulator + Node driver process + manual field focus for
#     the realistic flow. Runs locally via `make smoke`.
#
# Schedule:
#   - On push / PR to main/develop
#   - Weekly cron (Monday 08:00 UTC) to catch Apple drift (new Xcode
#     beta, new iOS release behavior changes) before users hit it

on:
  push:
    branches: [main, develop]
    paths:
      - 'native/ios-driver/**'
      - 'packages/core-driver-ios/**'
      - 'packages/core-driver-wire/**'
      - 'src/adapters/ios-xctest.adapter.ts'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'native/ios-driver/**'
      - 'packages/core-driver-ios/**'
      - 'packages/core-driver-wire/**'
      - 'src/adapters/ios-xctest.adapter.ts'
      - '.github/workflows/ios.yml'
  schedule:
    - cron: '0 8 * * 1' # Monday 08:00 UTC — weekly drift check
  workflow_dispatch: # manual trigger from the Actions tab

jobs:
  unit-tests:
    name: unit-tests (Xcode ${{ matrix.xcode }}, iOS ${{ matrix.ios }})
    # GitHub macOS runners. Each runner image ships a specific default
    # Xcode but also has older versions available via xcode-select.
    #   - macos-14: ships Xcode 15.x, supports 14.3-16.x
    #   - macos-15: ships Xcode 16.x, supports 15.x-17.x
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            xcode: '15.4'
            ios: '17.5'
          - runner: macos-15
            xcode: '16.2'
            ios: '18.2'
          - runner: macos-15
            xcode: '16.4'
            ios: '18.4'
    steps:
      - uses: actions/checkout@v4

      - name: select Xcode ${{ matrix.xcode }}
        run: |
          sudo xcode-select -s "/Applications/Xcode_${{ matrix.xcode }}.app"
          xcodebuild -version
          swift --version

      - name: install xcodegen
        run: |
          brew install xcodegen
          xcodegen --version

      - name: pick + boot simulator
        id: sim
        # Pick the first available iPhone in the target iOS runtime
        # catalog, boot it, and wait for `Booted` state before the
        # xcodebuild step. Hard-coding a specific device model
        # (e.g. "iPhone 16 Pro") is fragile across runner image
        # updates — just pick the first iPhone available.
        run: |
          set -eu
          RUNTIME="com.apple.CoreSimulator.SimRuntime.iOS-$(echo '${{ matrix.ios }}' | tr . -)"
          echo "runtime=$RUNTIME"

          UDID=$(xcrun simctl list devices available -j \
            | jq -r --arg rt "$RUNTIME" '
              .devices[$rt] // []
              | map(select(.name | contains("iPhone")))
              | .[0].udid // empty
            ')
          if [ -z "$UDID" ]; then
            echo "::error::no iPhone device found for $RUNTIME"
            xcrun simctl list devices available
            exit 1
          fi
          echo "udid=$UDID"

          xcrun simctl boot "$UDID" 2>/dev/null || true

          # Poll for Booted state — xcodebuild test-without-building
          # will boot eagerly, but blocking here gives a clean log.
          for i in {1..60}; do
            if xcrun simctl list devices | grep "$UDID" | grep -q "Booted"; then
              echo "simulator booted after ${i}s"
              break
            fi
            sleep 1
          done

          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: make setup (xcodegen + build-for-testing)
        working-directory: native/ios-driver
        run: make setup UDID=${{ steps.sim.outputs.udid }}

      - name: make test (unit tests)
        working-directory: native/ios-driver
        run: make test UDID=${{ steps.sim.outputs.udid }}

      - name: upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-xcode${{ matrix.xcode }}-ios${{ matrix.ios }}
          path: |
            native/ios-driver/build/Logs/Test/
            native/ios-driver/build/Build/Intermediates.noindex/
          if-no-files-found: ignore
          retention-days: 7
